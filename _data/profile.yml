short_bio: >-
  <p>
    Hi, my name is Wu Lin. Welcome to my homepage. I received my bachelor's degree
    in Engineering Mechanics from Nanjing University of Aeronautics and Astronautics
    in 2025. Currently, I am a Ph.D. student in Solid Mechanics at the School of
    Mechanics and Engineering Sciences, Peking University, advised by Professor
    Yongmao Pei.
  </p>
  <p>
    My research interests include solid mechanics, dynamics and control,
    computational mechanics, acoustic manipulation, haptic feedback, and spacecraft
    system dynamics. I have worked on trajectory optimization for on-orbit assembly
    of swarm satellites, separation dynamics of stacked satellite systems, and
    wave-based methods for programmable particle manipulation and haptic interaction.
    Welcome to reach out to me for communication and cooperation.
  </p>

