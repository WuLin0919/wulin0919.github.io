short_bio: >-
  <p>
    I am an undergraduate student in the Qian Weichang Honors Program of Engineering Mechanics at
    Nanjing University of Aeronautics and Astronautics. My academic training covers theoretical
    mechanics, material mechanics, elasticity, fluid mechanics, computational mechanics, experimental
    mechanics, plasticity, analytical mechanics, aircraft structural mechanics, vibration theory,
    numerical computation, and advanced dynamics.
  </p>
  <p>
    My current research interests lie in multibody system dynamics, spacecraft dynamics and control,
    computational mechanics, and trajectory optimization. I have worked on assembly trajectory
    optimization for swarm satellite systems using natural coordinate formulation, potential-field and
    PD control, distributed auction algorithms, and generalized-alpha integration for differential
    algebraic equations.
  </p>
  <p>
    I ranked first in my major cohort (1/68), with an overall GPA of 4.2/5.0 and a required-course GPA
    of 4.3/5.0. I am always happy to discuss mechanics, aerospace engineering, scientific computing,
    and collaborative research opportunities.
  </p>
  <p>
    Profiles:
    <a href="https://orcid.org/0009-0005-6544-2197" target="_blank">ORCID</a> /
    <a href="https://webofscience.clarivate.cn/wos/author/record/POY-4128-2026" target="_blank">Web of Science</a>.
  </p>

